name: 🔄 Update Profile Assets

on:
  # Run every 12 hours automatically
  schedule:
    - cron: "0 */12 * * *"
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
  # Run on every push to main
  push:
    branches:
      - main

jobs:
  generate:
    name: Generate Profile Assets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 📂 Create dist directory
        run: mkdir -p dist

      - name: 🐍 Generate GitHub Contribution Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: 🔧 Fix Snake SVG (clip top margin & trim right edge)
        run: |
          python3 << 'PYEOF'
          import re, glob

          for svg_file in glob.glob('dist/github-contribution-grid-snake*.svg'):
              with open(svg_file, 'r') as f:
                  content = f.read()

              # Find current viewBox values
              m = re.search(r'viewBox="(-?\d+(?:\.\d+)?) (-?\d+(?:\.\d+)?) (\d+(?:\.\d+)?) (\d+(?:\.\d+)?)"', content)
              if not m:
                  print(f'No viewBox found in {svg_file}')
                  continue

              vb_x   = float(m.group(1))
              vb_y   = float(m.group(2))
              vb_w   = float(m.group(3))
              vb_h   = float(m.group(4))

              # 1. Clip top: if vb_y is negative (snake enters from above grid), move it to 0
              if vb_y < 0:
                  clip_top   = -vb_y          # how many px we're removing from the top
                  new_vb_y   = 0
                  new_vb_h   = vb_h - clip_top
              else:
                  new_vb_y   = vb_y
                  new_vb_h   = vb_h

              # 2. Find rightmost grid cell x-coordinate
              cell_xs = [float(x) for x in re.findall(r'class="c[^"]*"[^/]*/?>|<rect[^>]+class="c[^"]*"', content)]
              all_x = re.findall(r'<rect[^>]+class="c[^"]*"[^>]*>', content)
              xs = []
              for tag in all_x:
                  xm = re.search(r'\bx="(-?\d+(?:\.\d+)?)"', tag)
                  if xm:
                      xs.append(float(xm.group(1)))

              if xs:
                  cell_w   = 12   # standard cell width in snk SVGs
                  max_cell_x = max(xs)
                  # Grid ends at max_cell_x + cell_w; add 4px breathing room
                  grid_right = max_cell_x + cell_w + 4
                  # New width = grid_right - vb_x  (keep left edge the same)
                  new_vb_w = grid_right - vb_x
                  if new_vb_w < vb_w:   # only shrink, never enlarge
                      pass
                  else:
                      new_vb_w = vb_w
              else:
                  new_vb_w = vb_w

              old_vb  = m.group(0)
              new_vb  = f'viewBox="{int(vb_x)} {int(new_vb_y)} {int(new_vb_w)} {int(new_vb_h)}"'
              content = content.replace(old_vb, new_vb, 1)

              # 3. Ensure SVG root has overflow="hidden" so animation is clipped
              content = re.sub(r'(<svg\b)(?![^>]*overflow=)', r'\1 overflow="hidden"', content)

              with open(svg_file, 'w') as f:
                  f.write(content)
              print(f'Fixed {svg_file}: {old_vb} → {new_vb}')
          PYEOF

      - name: 🏔️ Generate 3D Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: dist/metrics-isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          output_action: none

      - name: 🧠 Generate Coding Habits
        uses: lowlighter/metrics@latest
        with:
          filename: dist/metrics-habits.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          config_timezone: Asia/Kolkata
          output_action: none

      - name: 🏅 Generate Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: dist/metrics-achievements.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          output_action: none

      - name: 📂 Copy Metrics to Dist
        run: |
          sudo cp -r /metrics_renders/dist/. dist/
          sudo chown -R $USER:$USER dist/

      - name: 🚀 Push Output to `output` Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

