name: 🔄 Update Profile Assets

on:
  # Run every 12 hours automatically
  schedule:
    - cron: "0 */12 * * *"
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
  # Run on every push to main
  push:
    branches:
      - main

jobs:
  generate:
    name: Generate Profile Assets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 📂 Create dist directory
        run: mkdir -p dist

      - name: 🐍 Generate GitHub Contribution Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: 🔧 Fix Snake SVG (clip top margin & trim right edge)
        run: python3 .github/fix_snake_svg.py

      - name: 🏔️ Generate 3D Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: dist/metrics-isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          output_action: none

      - name: 🧠 Generate Coding Habits
        uses: lowlighter/metrics@latest
        with:
          filename: dist/metrics-habits.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          config_timezone: Asia/Kolkata
          output_action: none

      - name: 🏅 Generate Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: dist/metrics-achievements.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          output_action: none

      - name: 📂 Copy Metrics to Dist
        run: |
          sudo cp -r /metrics_renders/dist/. dist/
          sudo chown -R $USER:$USER dist/

      - name: 🚀 Push Output to `output` Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

